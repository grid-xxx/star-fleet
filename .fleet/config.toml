[agent]
backend = "cursor"  # "claude-code" | "cursor"

[review]
enabled = true              # local review loop
backend = "cursor"          # review agent backend
max_rounds = 3              # max local review-fix cycles
name = "Code Review"        # display name in logs

[watch]
poll_interval = "30s"   # how often to check for new events
timeout = "2h"          # max total watch time
idle_timeout = "30m"    # exit if no new events for this long
max_fix_rounds = 5      # max code fix iterations

[ci]
enabled = true          # watch CI check results
required_checks = []    # specific check names to watch (empty = all)

[test]
command = ""  # override auto-detected test command, e.g. "go test ./..."
